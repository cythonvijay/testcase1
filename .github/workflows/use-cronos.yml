name: CRONOS Enterprise Intelligence

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 1 — BOUNDARY Analysis
  # First gate. Detects boundary changes (> vs >=), quality, security.
  # fail_on_severity: MEDIUM — blocks anything above LOW severity.
  # ═══════════════════════════════════════════════════════════════════════════
  cronos-boundary:
    name: Stage 1 — BOUNDARY Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run CRONOS (BOUNDARY)
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: BOUNDARY
          fail_on_severity: MEDIUM
          full_analysis: "true"
          create_annotations: "true"

      - name: Upload Boundary Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-boundary-reports
          path: cronos-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 2 — CONTRACT Analysis
  # Validates interface and function signature compliance.
  # fail_on_severity: HIGH
  # ═══════════════════════════════════════════════════════════════════════════
  cronos-contract:
    name: Stage 2 — CONTRACT Analysis
    runs-on: ubuntu-latest
    needs: cronos-boundary
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run CRONOS (CONTRACT)
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: CONTRACT
          fail_on_severity: HIGH
          full_analysis: "true"
          create_annotations: "true"

      - name: Upload Contract Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-contract-reports
          path: cronos-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 3 — STRICT Analysis
  # Final semantic gate. Blocks ANY behavioral change.
  # fail_on_severity: HIGH
  # ═══════════════════════════════════════════════════════════════════════════
  cronos-strict:
    name: Stage 3 — STRICT Analysis
    runs-on: ubuntu-latest
    needs: [ cronos-boundary, cronos-contract ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run CRONOS (STRICT)
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          fail_on_severity: HIGH
          full_analysis: "true"
          create_annotations: "true"

      - name: Upload Strict Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-strict-reports
          path: cronos-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 4 — UNIFIED Intelligence Report
  # Runs ONLY if all 3 stages pass. Generates consolidated full report.
  # ═══════════════════════════════════════════════════════════════════════════
  cronos-unified:
    name: Stage 4 — UNIFIED Intelligence Report
    runs-on: ubuntu-latest
    needs: [ cronos-boundary, cronos-contract, cronos-strict ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS — Unified Intelligence (full report + PR comment)
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          fail_on_severity: HIGH
          full_analysis: "true"
          create_annotations: "true"
          post_pr_comment: "false"

      - name: Upload Unified Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-unified-reports
          path: cronos-reports/

  # ═══════════════════════════════════════════════════════════════════════════
  # CRONOS Merge Gate
  # Evaluates all stage outcomes and produces final merge decision.
  # ═══════════════════════════════════════════════════════════════════════════
  cronos-merge-gate:
    name: CRONOS — Merge Gate
    runs-on: ubuntu-latest
    needs: [ cronos-boundary, cronos-contract, cronos-strict, cronos-unified ]
    if: always()
    steps:
      - name: Evaluate stage outcomes
        env:
          BOUNDARY: ${{ needs.cronos-boundary.result }}
          CONTRACT: ${{ needs.cronos-contract.result }}
          STRICT:   ${{ needs.cronos-strict.result }}
          UNIFIED:  ${{ needs.cronos-unified.result }}
        run: |
          echo "=============================================================="
          echo "  CRONOS Merge Gate — Stage Outcomes"
          echo "=============================================================="
          echo "  Stage 1 BOUNDARY : $BOUNDARY"
          echo "  Stage 2 CONTRACT : $CONTRACT"
          echo "  Stage 3 STRICT   : $STRICT"
          echo "  Stage 4 UNIFIED  : $UNIFIED"
          echo "=============================================================="

          FAILED=0
          [ "$BOUNDARY" != "success" ] && echo "  ❌ BOUNDARY failed" && FAILED=1
          [ "$CONTRACT" != "success" ] && echo "  ❌ CONTRACT failed" && FAILED=1
          [ "$STRICT"   != "success" ] && echo "  ❌ STRICT failed"   && FAILED=1

          if [ "$BOUNDARY" = "success" ]; then echo "  ✅ BOUNDARY passed"; fi
          if [ "$CONTRACT" = "success" ]; then echo "  ✅ CONTRACT passed"; fi
          if [ "$STRICT"   = "success" ]; then echo "  ✅ STRICT passed";   fi

          echo "=============================================================="
          if [ "$FAILED" = "1" ]; then
            echo "  ❌ MERGE GATE FAILED — one or more CRONOS stages failed."
            echo "     Fix the issues highlighted above before merging."
            echo "=============================================================="
            exit 1
          else
            echo "  ✅ MERGE GATE PASSED — all CRONOS stages passed."
            echo "     Unified Intelligence report has been generated."
            echo "=============================================================="
            exit 0
          fi
