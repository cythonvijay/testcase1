name: CRONOS Full Enterprise Intelligence

on:
# ============================================================================
# CRONOS 4-Stage Enterprise CI/CD Pipeline
#
# Stage 1 — BOUNDARY   : boundary condition analysis   (always runs)
# Stage 2 — CONTRACT   : contract compliance analysis  (always runs)
# Stage 3 — STRICT     : strict behavioral enforcement (always runs)
# Stage 4 — UNIFIED    : full intelligence report      (only if 1+2+3 all pass)
#
# Rules:
# • All 3 analysis stages (1-3) ALWAYS run even if a previous one fails.
# • Each stage uses /analyze_full so AI explanations always appear in logs.
# • continue-on-error: true on stages 1-3 so the pipeline does not abort early.
# • The merge-gate job reads the outcome of stages 1-3 and fails if any failed.
# • Unified Intelligence (stage 4) only runs when all 3 outcomes are 'success'.
# ============================================================================

on:
  push:
    branches: [ main, master ]

    branches:
      - main
      - master
  pull_request:
    branches: [ main, master ]

    branches:
      - main
      - master

jobs:

  # ── Stage 1: BOUNDARY ──────────────────────────────────────────────────────
  boundary:

    name: CRONOS — Boundary Mode
    name: "Stage 1 — BOUNDARY Analysis"
    runs-on: ubuntu-latest

    # Always run; continue-on-error so subsequent jobs still execute
    continue-on-error: true
    steps:

      - uses: actions/checkout@v4
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
      - name: CRONOS — Boundary Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: BOUNDARY
          repo: ${{ github.repository }}
          api_url:          ${{ secrets.CRONOS_API_URL }}
          mode:             BOUNDARY
          repo:             ${{ github.repository }}
          github_token:     ${{ secrets.GITHUB_TOKEN }}
          # Boundary only warns on CRITICAL; HIGH is allowed (boundary shifts expected)
          fail_on_severity: CRITICAL
          full_analysis: "false"


          # full_analysis=true → /analyze_full → all 4 AI fields in logs
          full_analysis:    "true"
          create_annotations: "true"
          post_pr_comment:  "false"

  # ── Stage 2: CONTRACT ──────────────────────────────────────────────────────
  contract:

    name: CRONOS — Contract Mode
    name: "Stage 2 — CONTRACT Analysis"
    runs-on: ubuntu-latest
    needs: boundary

    # Does NOT depend on boundary — runs regardless of stage 1 result
    continue-on-error: true
    steps:

      - uses: actions/checkout@v4
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
      - name: CRONOS — Contract Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: CONTRACT
          repo: ${{ github.repository }}
          api_url:          ${{ secrets.CRONOS_API_URL }}
          mode:             CONTRACT
          repo:             ${{ github.repository }}
          github_token:     ${{ secrets.GITHUB_TOKEN }}
          fail_on_severity: HIGH
          full_analysis: "false"


          full_analysis:    "true"
          create_annotations: "true"
          post_pr_comment:  "false"

  # ── Stage 3: STRICT ────────────────────────────────────────────────────────
  strict:

    name: CRONOS — Strict Mode
    name: "Stage 3 — STRICT Analysis"
    runs-on: ubuntu-latest
    needs: contract

    # Does NOT depend on boundary or contract — runs regardless
    continue-on-error: true
    steps:

      - uses: actions/checkout@v4
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
      - name: CRONOS — Strict Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          repo: ${{ github.repository }}
          api_url:          ${{ secrets.CRONOS_API_URL }}
          mode:             STRICT
          repo:             ${{ github.repository }}
          github_token:     ${{ secrets.GITHUB_TOKEN }}
          fail_on_severity: HIGH
          full_analysis: "false"


          full_analysis:    "true"
          create_annotations: "true"
          post_pr_comment:  "false"

  # ── Stage 4: UNIFIED INTELLIGENCE (only if all 3 pass) ────────────────────
  intelligence:

    name: CRONOS — Unified Intelligence Report
    name: "Stage 4 — UNIFIED Intelligence Report"
    runs-on: ubuntu-latest
    needs: strict

    # Depends on all 3 stages; only runs when ALL succeed (no continue-on-error here)
    needs:
      - boundary
      - contract
      - strict
    # Conditional: skip if any upstream job failed or was cancelled
    if: |
      needs.boundary.result == 'success' &&
      needs.contract.result == 'success' &&
      needs.strict.result   == 'success'
    steps:

      - uses: actions/checkout@v4
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
      - name: CRONOS — Unified Intelligence (full report + PR comment)
        uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          repo: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          post_pr_comment: "true"
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               STRICT
          repo:               ${{ github.repository }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          pr_number:          ${{ github.event.pull_request.number }}
          # Post the full intelligence PR comment only in this final stage
          post_pr_comment:    "true"
          create_annotations: "true"
          full_analysis: "true"


          fail_on_severity:   HIGH
          full_analysis:      "true"

  # ── Merge Gate: enforces all 3 stages passed ───────────────────────────────
  merge-gate:

    name: CRONOS — Merge Gate
    name: "CRONOS — Merge Gate"
    runs-on: ubuntu-latest
    needs: [boundary, contract, strict]

    needs:
      - boundary
      - contract
      - strict
    # Always run so it can report the consolidated pass/fail
    if: always()
    steps:

      - run: echo "CRONOS verified — safe to merge"
      - name: Evaluate stage outcomes
        shell: bash
        run: |
          BOUNDARY="${{ needs.boundary.result }}"
          CONTRACT="${{ needs.contract.result }}"
          STRICT="${{ needs.strict.result }}"

          echo "=============================================================="
          echo "  CRONOS Merge Gate — Stage Outcomes"
          echo "=============================================================="
          echo "  Stage 1 BOUNDARY : $BOUNDARY"
          echo "  Stage 2 CONTRACT : $CONTRACT"
          echo "  Stage 3 STRICT   : $STRICT"
          echo "=============================================================="

          FAILED=0

          if [ "$BOUNDARY" != "success" ]; then
            echo "  ❌ BOUNDARY stage did not pass (result: $BOUNDARY)"
            FAILED=1
          else
            echo "  ✅ BOUNDARY passed"
          fi

          if [ "$CONTRACT" != "success" ]; then
            echo "  ❌ CONTRACT stage did not pass (result: $CONTRACT)"
            FAILED=1
          else
            echo "  ✅ CONTRACT passed"
          fi

          if [ "$STRICT" != "success" ]; then
            echo "  ❌ STRICT stage did not pass (result: $STRICT)"
            FAILED=1
          else
            echo "  ✅ STRICT passed"
          fi

          echo "=============================================================="

          if [ "$FAILED" = "1" ]; then
            echo "  ❌ MERGE GATE FAILED — one or more CRONOS stages did not pass."
            echo "     Review the per-stage explanations in the job logs above."
            echo "     The Unified Intelligence stage was skipped as a result."
            echo "=============================================================="
            exit 1
          else
            echo "  ✅ MERGE GATE PASSED — all CRONOS stages passed."
            echo "     Unified Intelligence report has been generated."
            echo "=============================================================="
            exit 0
          fi
