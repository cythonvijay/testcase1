name: CRONOS Full Intelligence Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  cronos-boundary:
    name: CRONOS — Boundary Mode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: BOUNDARY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-boundary-reports
          path: cronos-reports/


  cronos-contract:
    name: CRONOS — Contract Mode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: CONTRACT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-contract-reports
          path: cronos-reports/


  cronos-strict:
    name: CRONOS — Strict Mode
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-strict-reports
          path: cronos-reports/


  merge-gate:
    name: CRONOS — Final Merge Gate
    runs-on: ubuntu-latest
    needs: [cronos-boundary, cronos-contract, cronos-strict]

    steps:
      - run: echo "All intelligence stages completed."
