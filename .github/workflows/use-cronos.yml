name: CRONOS Full Intelligence Analysis

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Stage 1 — BOUNDARY
  # Runs first. Allows structural boundary changes (> vs >=).
  # ─────────────────────────────────────────────────────────────────────────
  cronos-boundary:
    name: CRONOS — Boundary Mode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               BOUNDARY
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          pr_number:          ${{ github.event.pull_request.number }}
          post_pr_comment:    ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          create_annotations: "true"
          repo:               ${{ github.repository }}
          fail_on_severity:   CRITICAL

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-boundary-reports-${{ github.run_id }}
          path: cronos-reports/

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 2 — CONTRACT
  # Runs after BOUNDARY. Validates signatures and return types.
  # ─────────────────────────────────────────────────────────────────────────
  cronos-contract:
    name: CRONOS — Contract Mode
    runs-on: ubuntu-latest
    needs: cronos-boundary
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               CONTRACT
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          pr_number:          ${{ github.event.pull_request.number }}
          post_pr_comment:    ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          create_annotations: "true"
          repo:               ${{ github.repository }}
          fail_on_severity:   HIGH

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-contract-reports-${{ github.run_id }}
          path: cronos-reports/

  # ─────────────────────────────────────────────────────────────────────────
  # Stage 3 — STRICT
  # Runs after CONTRACT. Blocks any semantic behavior change.
  # ─────────────────────────────────────────────────────────────────────────
  cronos-strict:
    name: CRONOS — Strict Mode
    runs-on: ubuntu-latest
    needs: cronos-contract
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               STRICT
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          pr_number:          ${{ github.event.pull_request.number }}
          post_pr_comment:    ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          create_annotations: "true"
          repo:               ${{ github.repository }}
          fail_on_severity:   HIGH

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-strict-reports-${{ github.run_id }}
          path: cronos-reports/

  # ─────────────────────────────────────────────────────────────────────────
  # Final gate — waits for all 3 stages
  # Only reached if BOUNDARY → CONTRACT → STRICT all pass
  # ─────────────────────────────────────────────────────────────────────────
  merge-gate:
    name: CRONOS — Final Merge Gate
    runs-on: ubuntu-latest
    needs: [ cronos-boundary, cronos-contract, cronos-strict ]
    steps:
      - run: echo "✅ All CRONOS intelligence stages passed — safe to merge."
