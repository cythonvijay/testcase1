name: CRONOS Full Enterprise Intelligence

# ============================================================================
# CRONOS 4-Stage Enterprise CI/CD Pipeline
#
# Stage 1 — BOUNDARY   : boundary condition analysis   (always runs)
# Stage 2 — CONTRACT   : contract compliance analysis  (always runs)
# Stage 3 — STRICT     : strict behavioral enforcement (always runs)
# Stage 4 — UNIFIED    : full intelligence report      (only if 1+2+3 all pass)
#
# FIX: Removed continue-on-error from all stages.
# continue-on-error: true causes GitHub to report result='success' even when
# steps inside the job fail — making needs.<job>.result always 'success' and
# causing the merge gate to pass incorrectly.
#
# Instead, all 3 analysis jobs run in parallel (no 'needs' between them),
# the merge-gate runs with if: always() and correctly reads their real results,
# and stage 4 only runs when all 3 genuinely passed.
# ============================================================================

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:

  # ── Stage 1: BOUNDARY ──────────────────────────────────────────────────────
  boundary:
    name: "Stage 1 — BOUNDARY Analysis"
    runs-on: ubuntu-latest
    # FIX: No continue-on-error here — real failure must surface as result='failure'
    steps:
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS — Boundary Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               BOUNDARY
          repo:               ${{ github.repository }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          fail_on_severity:   CRITICAL
          full_analysis:      "true"
          create_annotations: "true"
          post_pr_comment:    "false"

  # ── Stage 2: CONTRACT ──────────────────────────────────────────────────────
  contract:
    name: "Stage 2 — CONTRACT Analysis"
    runs-on: ubuntu-latest
    # FIX: No continue-on-error — runs in parallel with boundary, not blocked by it
    steps:
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS — Contract Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               CONTRACT
          repo:               ${{ github.repository }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          fail_on_severity:   HIGH
          full_analysis:      "true"
          create_annotations: "true"
          post_pr_comment:    "false"

  # ── Stage 3: STRICT ────────────────────────────────────────────────────────
  strict:
    name: "Stage 3 — STRICT Analysis"
    runs-on: ubuntu-latest
    # FIX: No continue-on-error — runs in parallel, real failure = result='failure'
    steps:
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS — Strict Mode
        uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               STRICT
          repo:               ${{ github.repository }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          fail_on_severity:   HIGH
          full_analysis:      "true"
          create_annotations: "true"
          post_pr_comment:    "false"

  # ── Stage 4: UNIFIED INTELLIGENCE (only if all 3 genuinely passed) ─────────
  intelligence:
    name: "Stage 4 — UNIFIED Intelligence Report"
    runs-on: ubuntu-latest
    needs:
      - boundary
      - contract
      - strict
    # FIX: Without continue-on-error masking, needs.<job>.result is now accurate.
    # This condition will correctly skip if any real failure occurred.
    if: |
      needs.boundary.result == 'success' &&
      needs.contract.result == 'success' &&
      needs.strict.result   == 'success'
    steps:
      - name: Checkout (full diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS — Unified Intelligence (full report + PR comment)
        uses: cythonvijay/cronos-action@main
        with:
          api_url:            ${{ secrets.CRONOS_API_URL }}
          mode:               STRICT
          repo:               ${{ github.repository }}
          github_token:       ${{ secrets.GITHUB_TOKEN }}
          pr_number:          ${{ github.event.pull_request.number }}
          post_pr_comment:    "true"
          create_annotations: "true"
          fail_on_severity:   HIGH
          full_analysis:      "true"

  # ── Merge Gate: enforces all 3 stages passed ───────────────────────────────
  merge-gate:
    name: "CRONOS — Merge Gate"
    runs-on: ubuntu-latest
    needs:
      - boundary
      - contract
      - strict
    # Always run so it can report consolidated pass/fail regardless of upstream
    if: always()
    steps:
      - name: Evaluate stage outcomes
        shell: bash
        run: |
          BOUNDARY="${{ needs.boundary.result }}"
          CONTRACT="${{ needs.contract.result }}"
          STRICT="${{ needs.strict.result }}"

          echo "=============================================================="
          echo "  CRONOS Merge Gate — Stage Outcomes"
          echo "=============================================================="
          echo "  Stage 1 BOUNDARY : $BOUNDARY"
          echo "  Stage 2 CONTRACT : $CONTRACT"
          echo "  Stage 3 STRICT   : $STRICT"
          echo "=============================================================="

          FAILED=0

          if [ "$BOUNDARY" != "success" ]; then
            echo "  ❌ BOUNDARY stage did not pass (result: $BOUNDARY)"
            FAILED=1
          else
            echo "  ✅ BOUNDARY passed"
          fi

          if [ "$CONTRACT" != "success" ]; then
            echo "  ❌ CONTRACT stage did not pass (result: $CONTRACT)"
            FAILED=1
          else
            echo "  ✅ CONTRACT passed"
          fi

          if [ "$STRICT" != "success" ]; then
            echo "  ❌ STRICT stage did not pass (result: $STRICT)"
            FAILED=1
          else
            echo "  ✅ STRICT passed"
          fi

          echo "=============================================================="

          if [ "$FAILED" = "1" ]; then
            echo "  ❌ MERGE GATE FAILED — one or more CRONOS stages did not pass."
            echo "     Review the per-stage explanations in the job logs above."
            echo "     The Unified Intelligence stage was skipped as a result."
            echo "=============================================================="
            exit 1
          else
            echo "  ✅ MERGE GATE PASSED — all CRONOS stages passed."
            echo "     Unified Intelligence report has been generated."
            echo "=============================================================="
            exit 0
          fi
