name: CRONOS Enterprise Intelligence

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  cronos-analysis:
    name: CRONOS Analysis (${{ matrix.mode }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    strategy:
      fail-fast: false # Ensures all modes finish analyzing even if one fails early
      matrix:
        include:
          - mode: BOUNDARY
            severity: MEDIUM
          - mode: CONTRACT
            severity: HIGH
          - mode: STRICT
            severity: HIGH
            
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: cythonvijay/cronos-action@main
        with:
          api_url:          ${{ secrets.CRONOS_API_URL }}
          mode:             ${{ matrix.mode }}
          fail_on_severity: ${{ matrix.severity }}
          github_token:     ${{ secrets.GITHUB_TOKEN }}
          pr_number:        ${{ github.event.pull_request.number }}
          repo:             ${{ github.repository }}
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cronos-${{ matrix.mode }}-report-${{ github.run_id }}
          path: cronos-reports/
          if-no-files-found: warn
