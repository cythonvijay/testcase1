name: CRONOS Intelligence Pipeline

on:
  pull_request:
    branches: ["main", "master", "develop"]
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:

  # ── Stage 1: BOUNDARY ──────────────────────────────────────────────────────
  cronos-boundary:
    name: "CRONOS | Stage 1 — BOUNDARY"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS BOUNDARY Analysis
        uses: cythonvijay/cronos-action@main
        with:
          api_url:           ${{ secrets.CRONOS_API_URL }}
          mode:              "BOUNDARY"
          repo:              ${{ github.repository }}
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          pr_number:         ${{ github.event.pull_request.number }}
          post_pr_comment:   "false"
          create_annotations: "true"
          fail_on_severity:  "HIGH"
          full_analysis:     "true"

  # ── Stage 2: CONTRACT ──────────────────────────────────────────────────────
  cronos-contract:
    name: "CRONOS | Stage 2 — CONTRACT"
    runs-on: ubuntu-latest
    needs: cronos-boundary
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS CONTRACT Analysis
        uses: cythonvijay/cronos-action@main
        with:
          api_url:           ${{ secrets.CRONOS_API_URL }}
          mode:              "CONTRACT"
          repo:              ${{ github.repository }}
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          pr_number:         ${{ github.event.pull_request.number }}
          post_pr_comment:   "false"
          create_annotations: "true"
          fail_on_severity:  "HIGH"
          full_analysis:     "true"

  # ── Stage 3: STRICT ────────────────────────────────────────────────────────
  cronos-strict:
    name: "CRONOS | Stage 3 — STRICT"
    runs-on: ubuntu-latest
    needs: cronos-contract
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS STRICT Analysis
        uses: cythonvijay/cronos-action@main
        with:
          api_url:           ${{ secrets.CRONOS_API_URL }}
          mode:              "STRICT"
          repo:              ${{ github.repository }}
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          pr_number:         ${{ github.event.pull_request.number }}
          post_pr_comment:   "false"
          create_annotations: "true"
          fail_on_severity:  "HIGH"
          full_analysis:     "true"

  # ── Stage 4: UNIFIED INTELLIGENCE (only if all 3 pass) ────────────────────
  cronos-unified:
    name: "CRONOS | Stage 4 — UNIFIED INTELLIGENCE"
    runs-on: ubuntu-latest
    needs: [cronos-boundary, cronos-contract, cronos-strict]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: CRONOS UNIFIED INTELLIGENCE Analysis
        uses: cythonvijay/cronos-action@main
        with:
          api_url:           ${{ secrets.CRONOS_API_URL }}
          mode:              "STRICT"
          repo:              ${{ github.repository }}
          github_token:      ${{ secrets.GITHUB_TOKEN }}
          pr_number:         ${{ github.event.pull_request.number }}
          post_pr_comment:   "true"
          create_annotations: "true"
          fail_on_severity:  "HIGH"
          full_analysis:     "true"
