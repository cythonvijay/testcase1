name: CRONOS Full Enterprise Intelligence

on:

  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]


jobs:

# Stage 1 — Boundary
  boundary:

    name: CRONOS — Boundary Mode
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: BOUNDARY
          repo: ${{ github.repository }}
          fail_on_severity: CRITICAL
          full_analysis: "false"


# Stage 2 — Contract
  contract:

    name: CRONOS — Contract Mode
    runs-on: ubuntu-latest
    needs: boundary

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: CONTRACT
          repo: ${{ github.repository }}
          fail_on_severity: HIGH
          full_analysis: "false"


# Stage 3 — Strict
  strict:

    name: CRONOS — Strict Mode
    runs-on: ubuntu-latest
    needs: contract

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          repo: ${{ github.repository }}
          fail_on_severity: HIGH
          full_analysis: "false"


# Stage 4 — Unified Intelligence (FULL AI)
  intelligence:

    name: CRONOS — Unified Intelligence Report
    runs-on: ubuntu-latest
    needs: strict
    if: always()

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: cythonvijay/cronos-action@main
        with:
          api_url: ${{ secrets.CRONOS_API_URL }}
          mode: STRICT
          repo: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
          post_pr_comment: "true"
          create_annotations: "true"
          full_analysis: "true"


# Final merge gate
  merge-gate:

    name: CRONOS — Merge Gate
    runs-on: ubuntu-latest
    needs: [boundary, contract, strict]

    steps:

      - run: echo "CRONOS verified — safe to merge"
